name: Find My House
description: Discord bot, web UI and French real-estate listing scraper
version: "3.5.0"
slug: find_my_house
url: https://github.com/Achaak/find-my-house
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
image: ghcr.io/achaak/find-my-house-{arch}
ingress: true
ingress_port: 8099
ingress_entry: /
panel_admin: true
panel_icon: mdi:home-search
panel_title: Find My House
options:
  discord_token: ""
  discord_client_id: ""
  discord_guild_id: ""
  discord_channel_id: ""
  discord_admin_role_id: ""
  scrape_scrapers: bienici,leboncoin,seloger,logicimmo
  scrape_cron: "0 */2 * * *"
  scrape_city: Paris
  scrape_postal_code: ""
  scrape_max_price: 500000
  scrape_min_surface: 30
  scrape_min_land_surface: ""
  scrape_min_rooms: ""
  scrape_min_bedrooms: ""
  scrape_ancien_only: false
  scrape_max_travel_minutes: ""
  scrape_max_pages: 20
  enrichment_cron: "0 * * * *"
  enrichment_disabled: false
  enrichment_min_compat_score: 0
  enrichment_batch_limit: 20
  enrichment_search_limit: 1000
  log_level: info
  web_enabled: true
  web_admin_users: ""
schema:
  discord_token: password
  discord_client_id: str
  discord_guild_id: str?
  discord_channel_id: str?
  discord_admin_role_id: str?
  scrape_scrapers: str?
  scrape_cron: str?
  scrape_city: str?
  scrape_postal_code: str?
  scrape_max_price: int?
  scrape_min_surface: int?
  scrape_min_land_surface: int?
  scrape_min_rooms: int?
  scrape_min_bedrooms: int?
  scrape_ancien_only: bool?
  scrape_max_travel_minutes: int?
  scrape_max_pages: int?
  enrichment_cron: str?
  enrichment_disabled: bool?
  enrichment_min_compat_score: int?
  enrichment_batch_limit: int?
  enrichment_search_limit: int?
  log_level: str?
  web_enabled: bool?
  web_admin_users: str?
