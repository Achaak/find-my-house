name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/arm64
            ha_arch: aarch64
          - platform: linux/amd64
            ha_arch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Read app version
        run: echo "APP_VERSION=$(jq -r .version package.json)" >> "$GITHUB_ENV"

      - name: Verify version sync
        run: |
          PKG_VER=$(jq -r .version package.json)
          CFG_VER=$(grep '^version:' find-my-house/config.yaml | sed 's/version: "\(.*\)"/\1/')
          if [ "$PKG_VER" != "$CFG_VER" ]; then
            echo "Version mismatch: package.json=$PKG_VER, config.yaml=$CFG_VER"
            echo "Run: pnpm release:patch (or sync config.yaml manually)"
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/find-my-home-${{ matrix.ha_arch }}:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/find-my-home-${{ matrix.ha_arch }}:${{ env.APP_VERSION }}
            ghcr.io/${{ env.IMAGE_OWNER }}/find-my-home-${{ matrix.ha_arch }}:${{ github.sha }}
